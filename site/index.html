<html lang="en">

<head>
    <meta charset="utf-8">
    <!-- GitHub Pages project URLs are often opened as /repo (no trailing slash). Without a
         <base>, relative URLs like flappy_rust.wasm resolve beside / instead of under /repo/. -->
    <script>
        (function () {
            var p = location.pathname;
            var href;
            if (p.endsWith("/")) href = p;
            else {
                var last = p.slice(p.lastIndexOf("/") + 1);
                href = /\.(html?|wasm|js|css)$/i.test(last)
                    ? p.slice(0, p.lastIndexOf("/") + 1)
                    : p + "/";
            }
            var b = document.createElement("base");
            b.href = href || "/";
            document.head.insertBefore(b, document.currentScript);
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flappy Rust</title>
    <style>
        html,
        body,
        canvas {
            margin: 0px;
            padding: 0px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: absolute;
            background: black;
            z-index: 0;
        }
    </style>
</head>

<body>
    <canvas id="glcanvas" tabindex="1"></canvas>
    <!-- Macroquad / miniquad loader: https://github.com/not-fl3/macroquad -->
    <!-- Served locally so ad blockers / third-party blocking cannot drop the loader. -->
    <script src="mq_js_bundle.js"></script>
    <!-- localStorage hooks for WASM (miniquad plugin — not wasm-bindgen) -->
    <script src="storage_plugin.js"></script>
    <script>load("flappy_rust.wasm");</script>
</body>

</html>
